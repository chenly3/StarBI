# StarBI APISIX 配置
# 参考: https://apisix.apache.org/docs/apisix/configuration/

apisix:
  node_listen:
    - 9081
  enable_control: true
  control:
    ip: "0.0.0.0"
    port: 9092

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    admin_key_required: false
    admin_key:
      - name: admin
        key: edd1c9f034335f136f87ad84b625c8f1
        role: admin
    allow_admin:
      - 0.0.0.0/0
  etcd:
    host:
      - "http://starbi-etcd:2379"
    prefix: "/apisix"
    timeout: 30

nginx_config:
  error_log: "/usr/local/apisix/logs/error.log"
  error_log_level: "warn"

  worker_processes: auto
  worker_rlimit_nofile: 20480

  event:
    worker_connections: 10620

  http_configuration_snippet: |
    server {
        listen 9080;
        server_name _;

        set $starbi_dataease "starbi-dataease:8100";
        # SQLBot 已退化为无头服务，不再对外暴露
        # 保留变量供内网参考: starbi-sqlbot:8000

        # DataEase 前端静态资源
        location / {
            proxy_pass http://$starbi_dataease;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 500m;
        }

        # DataEase 后端 API（含 AI 代理）
        location /api {
            proxy_pass http://$starbi_dataease;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 500m;
        }

        # AI 网关代理（DataEase 后端代理 SQLBot）
        location /ai {
            proxy_pass http://$starbi_dataease;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 500m;
        }

        # SQLBot 内部 API（仅内网访问，不再对外暴露）
        # location /sqlbot-internal { ... }
    }

  http:
    access_log: "/usr/local/apisix/logs/access.log"
    keepalive_timeout: 60s
    client_header_timeout: 60s
    client_body_timeout: 60s
    send_timeout: 10s
    underscores_in_headers: "on"
    real_ip_header: "X-Real-IP"
    real_ip_recursive: "off"
    real_ip_from:
      - 127.0.0.1
      - "unix:"

plugins: []
stream_plugins: []
